services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  # Acts as the "nervous system". Backend publishes price updates here.
  # Every WebSocket connection subscribes and receives them in real-time.
  redis:
    image: redis:7-alpine
    container_name: cobalt_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  # Handles WebSocket connections, data ingestion, ML signals, agent orchestration
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cobalt_server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app   # hot-reload during development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  # The terminal UI — charts, heatmap, agent debate, SHAP explainer
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cobalt_client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules   # don't override node_modules with host mount
      - /app/.next
