name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Dependencies
        run: |
          cd server
          uv venv
          uv pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd server
          source .venv/bin/activate
          PYTHONPATH=. pytest

  # ── Frontend Checks ─────────────────────────────────────────────────────────
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Lint Verification
        run: |
          cd client
          npm run lint

      - name: TypeScript Type Check
        run: |
          cd client
          npm run type-check

  # ── Docker Builds ───────────────────────────────────────────────────────────
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Compose Production Build
        run: |
          docker compose -f docker-compose.prod.yml build
