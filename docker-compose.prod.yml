services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cobalt_redis_prod
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile.prod
    container_name: cobalt_server_prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - API_KEY=${API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: cobalt_client_prod
    ports:
      - "3000:3000"
    depends_on:
      - server

  # ── Nginx Reverse Proxy (TLS termination) ────────────────────────────────────
  # Handles HTTPS + WSS. Place SSL certs in ./nginx/ssl/ before deploying.
  # To use Let's Encrypt instead, replace with certbot-based setup.
  nginx:
    image: nginx:alpine
    container_name: cobalt_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - client
    restart: unless-stopped

