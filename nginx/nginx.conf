# ═══════════════════════════════════════════════════════════════════════
# Cobalt — Nginx Reverse Proxy for Production
# ═══════════════════════════════════════════════════════════════════════
# Handles:
#   - TLS termination (HTTPS + WSS)
#   - Proxying to FastAPI backend (port 8000) and Next.js frontend (port 3000)
#   - WebSocket upgrade for /ws/* endpoints
#   - Security headers
#
# SETUP:
#   1. Place your SSL certs at /etc/nginx/ssl/cert.pem and key.pem
#      (or use Let's Encrypt: certbot --nginx -d yourdomain.com)
#   2. Replace "yourdomain.com" with your actual domain
#   3. Mount this file in docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── TLS Certificates ──────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern TLS configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend (Next.js) ────────────────────────────────────────────
    location / {
        proxy_pass http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API (FastAPI REST) ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket endpoints (WSS) ─────────────────────────────────────
    # The Upgrade and Connection headers are required for WebSocket handshake
    location /ws/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep connections alive for up to 24 hours
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Monitoring endpoints ──────────────────────────────────────────
    location /metrics {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Optional: restrict to internal IPs only
        # allow 10.0.0.0/8;
        # deny all;
    }

    location /docs {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
